<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D20 - Dado de Rol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a0533 0%, #0a0015 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      gap: 32px;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #ccc 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #aaa 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, #ccc 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 45%, #bbb 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, #ddd 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      color: #c9a227;
      font-size: 2rem;
      text-align: center;
      text-shadow: 0 0 20px #c9a22799;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 1;
    }

    .scene {
      width: 260px;
      height: 260px;
      perspective: 800px;
      z-index: 1;
    }

    /* D20 shape using SVG polygon */
    .dice-wrapper {
      width: 260px;
      height: 260px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    .dice-wrapper.rolling {
      animation: roll3d 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes roll3d {
      0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1); }
      15%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg) scale(1.1); }
      35%  { transform: rotateX(360deg) rotateY(270deg) rotateZ(90deg) scale(0.9); }
      55%  { transform: rotateX(540deg) rotateY(180deg) rotateZ(200deg) scale(1.15); }
      75%  { transform: rotateX(680deg) rotateY(360deg) rotateZ(300deg) scale(0.95); }
      90%  { transform: rotateX(710deg) rotateY(380deg) rotateZ(330deg) scale(1.05); }
      100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(360deg) scale(1); }
    }

    .d20-svg {
      width: 240px;
      height: 240px;
      filter: drop-shadow(0 0 25px #7c3aed99) drop-shadow(0 0 50px #4c1d9522);
      transition: filter 0.3s;
    }

    .result-number {
      position: absolute;
      font-size: 3.8rem;
      font-weight: bold;
      color: #fff;
      text-shadow:
        0 0 10px #c9a227,
        0 0 25px #c9a227,
        0 0 50px #c9a22777;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      letter-spacing: -2px;
    }

    .result-number.visible { opacity: 1; }

    /* Critical results */
    .result-number.critical {
      color: #ffd700;
      text-shadow:
        0 0 10px #ff6600,
        0 0 25px #ff6600,
        0 0 50px #ff660077;
      animation: pulseGold 0.8s ease infinite alternate;
    }

    .result-number.fumble {
      color: #ff4444;
      text-shadow:
        0 0 10px #ff0000,
        0 0 25px #ff000077;
    }

    @keyframes pulseGold {
      from { transform: scale(1); }
      to   { transform: scale(1.1); }
    }

    /* Critical flash overlay */
    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }
    .flash.critical-flash {
      animation: flashGold 0.6s ease-out forwards;
      background: radial-gradient(ellipse at center, #ffd70044 0%, transparent 70%);
    }
    .flash.fumble-flash {
      animation: flashRed 0.6s ease-out forwards;
      background: radial-gradient(ellipse at center, #ff000033 0%, transparent 70%);
    }
    @keyframes flashGold { 0%{opacity:1} 100%{opacity:0} }
    @keyframes flashRed  { 0%{opacity:1} 100%{opacity:0} }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper label {
      display: block;
      color: #a78bfa;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: center;
    }

    input[type="text"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid #7c3aed66;
      border-radius: 8px;
      padding: 12px 20px;
      color: #e2e8f0;
      font-size: 1.1rem;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      width: 220px;
    }

    input[type="text"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 20px #7c3aed44;
    }

    input[type="text"]::placeholder { color: #64748b; }

    .roll-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
      border: 1px solid #a78bfa44;
      border-radius: 10px;
      padding: 14px 48px;
      color: #e9d5ff;
      font-size: 1.05rem;
      font-family: inherit;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px #7c3aed44, inset 0 1px 0 #a78bfa33;
    }

    .roll-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #8b5cf6 0%, #5b21b6 100%);
      box-shadow: 0 6px 30px #7c3aed77, inset 0 1px 0 #a78bfa44;
      transform: translateY(-2px);
    }

    .roll-btn:active:not(:disabled) { transform: translateY(1px); }
    .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-text {
      color: #94a3b8;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-align: center;
      min-height: 1.4em;
      z-index: 1;
      transition: color 0.3s;
    }

    .result-text.special { color: #c9a227; }
    .result-text.fumble  { color: #f87171; }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 1s ease-out forwards;
    }

    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }
  </style>
</head>
<body>

  <div class="flash" id="flash"></div>
  <div class="particles" id="particles"></div>

  <h1>&#9670; D20 &#9670;</h1>

  <div class="scene">
    <div class="dice-wrapper" id="diceWrapper">
      <svg class="d20-svg" id="d20svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#6d28d9"/>
            <stop offset="100%" stop-color="#2e1065"/>
          </linearGradient>
          <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#4c1d95"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Outer shadow/depth -->
        <polygon points="100,8 192,62 192,138 100,192 8,138 8,62"
          fill="#1e0a40" stroke="none"/>

        <!-- Main hexagonal body (simplified d20 face) -->
        <polygon points="100,10 190,60 190,140 100,190 10,140 10,60"
          fill="url(#faceGrad)" stroke="#a78bfa" stroke-width="1.5"
          filter="url(#glow)"/>

        <!-- Inner face triangles -->
        <!-- Top triangle -->
        <polygon points="100,10 148,60 52,60"
          fill="#5b21b6" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
        <!-- Upper-right -->
        <polygon points="148,60 190,60 190,100 148,100"
          fill="#4c1d95" stroke="#7c3aed" stroke-width="0.8" opacity="0.8"/>
        <!-- Right -->
        <polygon points="190,100 190,140 148,140 148,100"
          fill="#5b21b6" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
        <!-- Lower-right -->
        <polygon points="148,140 190,140 148,190 100,190"
          fill="#4c1d95" stroke="#7c3aed" stroke-width="0.8" opacity="0.8"/>
        <!-- Bottom triangle -->
        <polygon points="100,190 52,140 148,140"
          fill="#5b21b6" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
        <!-- Lower-left -->
        <polygon points="52,140 10,140 52,190 100,190"
          fill="#4c1d95" stroke="#7c3aed" stroke-width="0.8" opacity="0.8"/>
        <!-- Left -->
        <polygon points="10,100 52,100 52,140 10,140"
          fill="#5b21b6" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
        <!-- Upper-left -->
        <polygon points="10,60 52,60 52,100 10,100"
          fill="#4c1d95" stroke="#7c3aed" stroke-width="0.8" opacity="0.8"/>
        <!-- Center -->
        <polygon points="52,60 148,60 148,140 52,140"
          fill="#3b1584" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>

        <!-- D20 label at top -->
        <text x="100" y="42" text-anchor="middle"
          font-family="Georgia, serif" font-size="11" fill="#c4b5fd"
          letter-spacing="2" opacity="0.8">D20</text>

        <!-- Decorative inner lines -->
        <line x1="100" y1="10" x2="100" y2="190" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>
        <line x1="10"  y1="100" x2="190" y2="100" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>
        <line x1="52"  y1="60"  x2="148" y2="140" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>
        <line x1="148" y1="60"  x2="52"  y2="140" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>

        <!-- Shine -->
        <ellipse cx="80" cy="55" rx="25" ry="12"
          fill="white" opacity="0.06" transform="rotate(-20,80,55)"/>
      </svg>

      <div class="result-number" id="resultNum">—</div>
    </div>
  </div>

  <div class="controls">
    <div class="input-wrapper">
      <label for="playerName">Nombre del jugador</label>
      <input type="text" id="playerName" placeholder="Escribe tu nombre..." maxlength="30" autocomplete="off" />
    </div>
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">&#9670; Tirar &#9670;</button>
  </div>

  <div class="result-text" id="resultText">Ingresa tu nombre y tira el dado</div>

  <script>
    const SPECIAL_NAMES = ['fernando', 'diego', 'luis', 'cesar', 'chilo'];

    function normalize(str) {
      return str.trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function getResult(name) {
      const n = normalize(name);
      if (!n) return { value: Math.ceil(Math.random() * 20), type: 'normal' };
      if (n === 'papa') return { value: 1, type: 'fumble' };
      if (SPECIAL_NAMES.includes(n)) {
        const value = 15 + Math.floor(Math.random() * 6); // 15-20
        return { value, type: value === 20 ? 'critical' : 'special' };
      }
      return { value: Math.ceil(Math.random() * 20), type: 'normal' };
    }

    function getResultMessage(name, result) {
      const n = normalize(name);
      if (n === 'papa') return '¡Fumble épico, papá! 💀';
      if (result.value === 20) return `¡CRÍTICO NATURAL, ${name}! ⚔️`;
      if (result.value === 1)  return '¡Fumble total! 🎲';
      if (result.type === 'special') return `¡${name} tiene suerte del aventurero! ✨`;
      if (result.value >= 15) return '¡Resultado excelente! ⭐';
      if (result.value >= 10) return 'Resultado aceptable';
      return 'Necesitas más entrenamiento...';
    }

    function spawnParticles(isCritical) {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      const colors = isCritical
        ? ['#ffd700','#ffaa00','#ff6600','#ffffff']
        : ['#a78bfa','#7c3aed','#c4b5fd','#8b5cf6'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      for (let i = 0; i < (isCritical ? 40 : 18); i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / (isCritical ? 40 : 18) + Math.random() * 0.5;
        const dist  = 80 + Math.random() * 160;
        p.style.left  = cx + 'px';
        p.style.top   = cy + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        p.style.animationDelay = Math.random() * 0.3 + 's';
        p.style.animationDuration = (0.7 + Math.random() * 0.6) + 's';
        p.style.width  = (4 + Math.random() * 5) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
      }
      setTimeout(() => container.innerHTML = '', 2000);
    }

    let rolling = false;

    function rollDice() {
      if (rolling) return;
      rolling = true;

      const nameInput = document.getElementById('playerName');
      const name = nameInput.value;
      const result = getResult(name);

      const wrapper  = document.getElementById('diceWrapper');
      const numEl    = document.getElementById('resultNum');
      const textEl   = document.getElementById('resultText');
      const flashEl  = document.getElementById('flash');
      const btn      = document.getElementById('rollBtn');

      // Reset
      btn.disabled = true;
      numEl.classList.remove('visible','critical','fumble');
      numEl.textContent = '—';
      textEl.className = 'result-text';
      textEl.textContent = 'Tirando...';
      flashEl.className = 'flash';

      // Animate die
      wrapper.classList.remove('rolling');
      void wrapper.offsetWidth; // reflow
      wrapper.classList.add('rolling');

      // Show spinning intermediate numbers
      let tickInterval = setInterval(() => {
        numEl.classList.add('visible');
        numEl.textContent = Math.ceil(Math.random() * 20);
        numEl.classList.remove('critical','fumble');
      }, 80);

      setTimeout(() => {
        clearInterval(tickInterval);
        wrapper.classList.remove('rolling');

        // Final number
        numEl.textContent = result.value;
        numEl.classList.add('visible');

        if (result.type === 'critical') {
          numEl.classList.add('critical');
          flashEl.className = 'flash critical-flash';
          spawnParticles(true);
        } else if (result.type === 'fumble' || result.value === 1) {
          numEl.classList.add('fumble');
          flashEl.className = 'flash fumble-flash';
          spawnParticles(false);
        } else if (result.type === 'special') {
          spawnParticles(false);
        }

        const msg = getResultMessage(name || 'Desconocido', result);
        textEl.textContent = msg;
        textEl.className = 'result-text ' + (
          result.type === 'critical' ? 'special' :
          result.type === 'fumble'   ? 'fumble'  :
          result.type === 'special'  ? 'special' : ''
        );

        rolling = false;
        btn.disabled = false;
      }, 1300);
    }

    // Allow Enter key to roll
    document.getElementById('playerName').addEventListener('keydown', e => {
      if (e.key === 'Enter') rollDice();
    });
  </script>
</body>
</html>
